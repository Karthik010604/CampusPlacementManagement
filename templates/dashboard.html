{% extends "base.html" %}

{% block title %}
Dashboard
{% endblock %}

{% block content %}

<h1 class="mb-4">
    Placement Dashboard
</h1>

<div class="row">

    <div class="col-md-3">
        <div class="card text-center shadow">
            <div class="card-body">
                <h5>Total Students</h5>
                <h2>{{ total_students }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card text-center shadow">
            <div class="card-body">
                <h5>Total Companies</h5>
                <h2>{{ total_companies }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card text-center shadow">
            <div class="card-body">
                <h5>Applications</h5>
                <h2>{{ total_applications }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card text-center shadow">
            <div class="card-body">
                <h5>Readiness</h5>
                <h2>{{ readiness_score }}%</h2>
            </div>
        </div>
    </div>

</div>

{% endblock %}
