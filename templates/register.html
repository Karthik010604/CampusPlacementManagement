{% extends "base.html" %}

{% block title %}
Register Student
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Register Student</h3>
            </div>

            <div class="card-body">

                <form action="/save_student" method="POST">

                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text"
                               name="name"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Roll Number</label>
                        <input type="text"
                               name="rollno"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Branch</label>
                        <input type="text"
                               name="branch"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">CGPA</label>
                        <input type="number"
                               step="0.01"
                               name="cgpa"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Backlogs</label>
                        <input type="number"
                               name="backlogs"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email"
                               name="email"
                               class="form-control"
                               required>
                    </div>

                    <div class="d-grid">
                        <button type="submit"
                                class="btn btn-primary">
                            Save Student
                        </button>
                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
